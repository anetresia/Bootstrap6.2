<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>ref03 </title>
    <link href="./bootstrap-5.3.8/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden-check { display: none; }
        
        
        #t1:checked ~ .toast1,
        #t2:checked ~ .toast2,
        #t3:checked ~ .toast3 { display: none; }

        .toast-container { position: fixed; z-index: 1050; }
        .t-top-right { top: 20px; right: 20px; }
        .t-bottom-left { bottom: 20px; left: 20px; }
        .t-bottom-right { bottom: 20px; right: 20px; }
    </style>
</head>
<body class="p-5">

    <h2>Multiple Bootstrap Toasts without JS</h2>


    <input type="checkbox" id="t1" class="hidden-check">
    <input type="checkbox" id="t2" class="hidden-check">
    <input type="checkbox" id="t3" class="hidden-check">

    
    <div class="toast-container t-top-center toast1">
        <div class="toast show bg-info text-white border-0">
            <div class="d-flex">
                <div class="toast-body">This is an info alert!</div>
                <label for="t1" class="btn-close btn-close-white me-2 m-auto"></label>
            </div>
        </div>
    </div>


    <div class="toast-container t-bottom-left toast2">
        <div class="toast show bg-warning text-dark border-0">
            <div class="d-flex">
                <div class="toast-body">This is a warning alert!</div>
                <label for="t2" class="btn-close me-2 m-auto"></label>
            </div>
        </div>
    </div>

    
    <div class="toast-container t-bottom-right toast3">
        <div class="toast show bg-success text-white border-0">
            <div class="d-flex">
                <div class="toast-body">This is a success alert!</div>
                <label for="t3" class="btn-close btn-close-white me-2 m-auto"></label>
            </div>
        </div>
    </div>

</body>
</html>
