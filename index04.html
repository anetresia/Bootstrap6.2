<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ref 04</title>

    <!-- Bootstrap CSS -->
    <link href="./bootstrap-5.3.8/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h1>Modal- Nested Confirm</h1>
    <h4>Main modal that opens a confirmation modal</h4>

<div class="container text-center mt-5">

    <!-- Main Trigger Button -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#mainModal">
        Open Modal
    </button>

</div>

<!-- Main Modal -->
<div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Modal Title</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p>Perform an action that needs confirmation.</p>

                <!-- Open Second Modal -->
                <button type="button"
                        class="btn btn-danger"
                        data-bs-target="#confirmModal"
                        data-bs-toggle="modal">
                    Delete Item
                </button>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Are you sure you want to delete this item?
            </div>

            <div class="modal-footer">

                <!-- Back to Main Modal -->
                <button class="btn btn-secondary"
                        data-bs-target="#mainModal"
                        data-bs-toggle="modal">
                    Back
                </button>

                <button class="btn btn-danger">
                    Confirm Delete
                </button>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="./bootstrap-5.3.8/js/bootstrap.bundle.min.js"></script>

</body>
</html>
